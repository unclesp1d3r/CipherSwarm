queue_rules:
  # Dosubot: only needs lint to pass
  - name: dosubot
    merge_method: squash
    autoqueue: true
    queue_conditions:
      - author = dosubot[bot]
      - base = main
    merge_conditions:
      - check-success = lint

  # Dependabot workflow-only changes: only needs lint to pass
  - name: dependabot-workflows
    merge_method: squash
    autoqueue: true
    queue_conditions:
      - author = dependabot[bot]
      - base = main
      - "-files ~= ^(?!\\.github/workflows/)"
    merge_conditions:
      - check-success = lint

  # Dependabot non-workflow changes: full merge protections required
  - name: dependabot
    merge_method: squash
    autoqueue: true
    queue_conditions:
      - author = dependabot[bot]
      - base = main
    merge_conditions:
      - check-success = lint
      - check-success = lint_api
      - check-success = scan_ruby
      - check-success = test
      - check-success = DCO

  # Human PRs: manually enqueued via /queue command (repo permissions restrict to maintainers)
  - name: default
    merge_method: squash
    queue_conditions:
      - base = main
      - author != dependabot[bot]
      - author != dosubot[bot]
    merge_conditions:
      - check-success = lint
      - check-success = lint_api
      - check-success = scan_ruby
      - check-success = test
      - check-success = DCO

pull_request_rules:
  - name: Auto-approve dosubot PRs
    description: Approve dosubot PRs so they can proceed through the queue
    conditions:
      - base = main
      - author = dosubot[bot]
    actions:
      review:
        type: APPROVE
        message: Automatically approved by Mergify

  - name: Auto-approve dependabot PRs
    description: Approve dependabot PRs so they can proceed through the queue
    conditions:
      - base = main
      - author = dependabot[bot]
    actions:
      review:
        type: APPROVE
        message: Automatically approved by Mergify

  - name: Keep PRs up to date with main
    conditions:
      - base = main
      - -conflict
      - -draft
    actions:
      update: {}

merge_protections:
  - name: Enforce conventional commit
    description: Make sure that we follow https://www.conventionalcommits.org/en/v1.0.0/
    if:
      - base = main
      - author != dependabot[bot]
      - author != dosubot[bot]
    success_conditions:
      - "title ~=
        ^(fix|feat|docs|style|refactor|perf|test|build|ci|chore|revert)(?:\\(.+\
        \\))?:"

  - name: Full CI must pass
    description: All CI checks must pass for non-bot PRs and dependabot non-workflow changes
    if:
      - base = main
      - or:
          - and:
              - author != dependabot[bot]
              - author != dosubot[bot]
          - and:
              - author = dependabot[bot]
              - "files ~= ^(?!\\.github/workflows/)"
    success_conditions:
      - check-success = lint
      - check-success = lint_api
      - check-success = scan_ruby
      - check-success = test
      - check-success = DCO

  - name: Lint must pass for bots
    description: At minimum lint must pass for dosubot and dependabot workflow-only changes
    if:
      - base = main
      - or:
          - author = dosubot[bot]
          - and:
              - author = dependabot[bot]
              - "-files ~= ^(?!\\.github/workflows/)"
    success_conditions:
      - check-success = lint

  - name: Do not merge outdated PRs
    description: Make sure PRs are within 10 commits of the base branch before merging
    if:
      - base = main
    success_conditions:
      - "#commits-behind <= 10"
