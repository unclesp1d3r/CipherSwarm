# .pre-commit-config.yaml

repos:
  # 🧼 Standard code cleanup hooks (language agnostic)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-xml
      - id: mixed-line-ending
        args: [--fix=auto]
      - id: check-vcs-permalinks

  # Use local rubocop via bundle exec to ensure all gems are available
  - repo: local
    hooks:
      - id: rubocop
        name: Check Ruby style with rubocop
        entry: bin/rubocop --force-exclusion
        language: system
        types: [ruby]
        require_serial: true

  # 🧪 GitHub Actions validation
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        files: ".github/workflows/"

  # 🐚 Shell script validation
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # 📝 Markdown formatting and linting (temporarily disabled in CI due to path issues)
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-admon
          - mdformat-config
          - mdformat-footnote
          - mdformat-simple-breaks
          - mdformat-web
          - mdformat-ruff
          - mdformat-gfm-alerts
          - mdformat-toc
          - mdformat-front-matters
        types: [markdown]
        # `docs/plans/` is a gitignored working-artifact directory (per AGENTS.md);
        # `.context/` holds ce-review and other agent-pipeline artifacts. Neither
        # should be reformatted during a normal commit — they're scratch space.
        exclude: ^(docs/plans/|\.context/)
