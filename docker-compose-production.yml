# CipherSwarm Production Docker Compose
#
# Web Scaling Formula: scale = n + 1, where n = number of fully active cracking nodes.
# This is a conservative upper bound assuming worst-case concurrent API traffic.
# For typical deployments with 30-second heartbeat intervals, fewer replicas may suffice.
# Monitor nginx access logs and Puma queue depth to right-size.
#
# Example: 8 active nodes -> --scale web=9, 16 active nodes -> --scale web=17
#
# Scale at runtime (default is 1 replica):
#   docker compose -f docker-compose-production.yml up -d --scale web=N
#   or: just docker-prod-scale N
#
# See docs/deployment/production-load-balancing.md for full details.

x-common-env-vars: &common-env-vars
  RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis-db:6379
  DATABASE_URL: postgres://root:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres-db/
  # Disable Rails force_ssl since TLS is terminated upstream (or not used in lab environments).
  DISABLE_SSL: ${DISABLE_SSL:-true}

x-replicas: &replicas
  mode: replicated
  endpoint_mode: vip
  restart_policy:
    condition: on-failure
    delay: 10s
    max_attempts: 3
    window: 120s
  update_config:
    delay: 10s
    parallelism: 2
    failure_action: rollback
    monitor: 1m
    max_failure_ratio: 0.3
    order: start-first

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      tusd:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    image: ghcr.io/unclesp1d3r/cipherswarm:latest
    environment:
      <<: *common-env-vars
      TUSD_HOOK_SECRET: ${TUSD_HOOK_SECRET:?TUSD_HOOK_SECRET must be set for production}
    depends_on:
      redis-db:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    # See docs/deployment/docker-storage-and-tmp.md for tmpfs sizing guidance.
    # For 100 GB+ attack resources, set TMPFS_TMP_SIZE >= 1.5x your largest file.
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-512m},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    volumes:
      - storage:/rails/storage
      - tus_uploads:/srv/tusd-data
      - attack_resources:/data/attack_resources
    networks:
      - frontend
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost/up || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  postgres-db:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - backend

  redis-db:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks:
      - backend
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - redis:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 1s
      timeout: 3s
      retries: 5

  tusd:
    image: tusproject/tusd:v2
    command:
      - -upload-dir=/srv/tusd-data
      - -hooks-http=http://web:80/api/v1/hooks/tus
      - -hooks-enabled-events=post-finish
      - -hooks-http-retry=5
      - -hooks-http-backoff=2
      - -hooks-http-forward-headers=X-Tusd-Hook-Secret
      - -behind-proxy
      - -base-path=/uploads/
      - -max-size=0
    environment:
      - TUSD_HOOK_SECRET=${TUSD_HOOK_SECRET:?TUSD_HOOK_SECRET must be set for production}
    volumes:
      - tus_uploads:/srv/tusd-data
      - attack_resources:/data/attack_resources
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  tusd-cleanup:
    image: alpine:3
    volumes:
      - tus_uploads:/srv/tusd-data
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        find /srv/tusd-data -name '*.info' -mmin +1440 -exec sh -c 'rm -f \"$$1\" \"$${1%.info}\"' _ {} \\;;
        sleep 3600;
      done"
    restart: unless-stopped

  sidekiq:
    image: ghcr.io/unclesp1d3r/cipherswarm:latest
    command: bundle exec sidekiq
    environment:
      <<: *common-env-vars
    depends_on:
      redis-db:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    # See docs/deployment/docker-storage-and-tmp.md for tmpfs sizing guidance.
    # Sidekiq downloads blobs to /tmp during ingest jobs — size this for your largest file.
    # For 100 GB+ wordlists, consider the TMPDIR volume approach instead of RAM-backed tmpfs.
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-512m},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    volumes:
      - storage:/rails/storage
      - tus_uploads:/srv/tusd-data
      - attack_resources:/data/attack_resources
    networks:
      - backend
    deploy:
      replicas: 4
      <<: *replicas
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:7433 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Monitoring (opt-in via --profile monitoring)
  #
  # Enable:  docker compose -f docker-compose-production.yml --profile monitoring up -d
  # Disable: omit --profile monitoring (these services won't start)
  #
  # Requires METRICS_ENABLED=true in .env so web/sidekiq expose /metrics.
  # All images pinned for air-gapped deployment — pre-pull before transfer.
  # ---------------------------------------------------------------------------

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.4.1
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
    networks:
      - backend
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana-oss:11.6.0
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_SERVER_ROOT_URL: "http://${APPLICATION_HOST:-localhost}:${GRAFANA_PORT:-3001}"
      # Air-gapped: disable all external checks
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ""
      GF_UNIFIED_ALERTING_ENABLED: "true"
    networks:
      - backend
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: "redis://redis-db:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  backend:
  frontend:

volumes:
  storage:
  postgres:
  redis:
  tus_uploads:
  attack_resources:
  prometheus_data:
  grafana_data:
