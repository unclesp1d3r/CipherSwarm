# Production layer for CipherSwarm.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#   With monitoring (Prometheus + Grafana + redis-exporter):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile monitoring up -d
#
# Web scaling (see docs/deployment/production-load-balancing.md):
#   scale = n + 1, where n = number of fully active cracking nodes
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale web=N
#   or: just docker-prod-scale N
#
# Example: 8 active nodes -> --scale web=9, 16 active nodes -> --scale web=17.
# Monitor nginx access logs and Puma queue depth to right-size.
#
# All images pinned for air-gapped deployment — pre-pull before transfer.
# Set CIPHERSWARM_IMAGE_TAG to the release tag being deployed (never use :latest
# in an air-gapped environment; the tag may not match what was transferred).

x-replicas: &replicas
  mode: replicated
  endpoint_mode: vip
  restart_policy:
    condition: on-failure
    delay: 10s
    max_attempts: 3
    window: 120s
  update_config:
    delay: 10s
    parallelism: 2
    failure_action: rollback
    monitor: 1m
    max_failure_ratio: 0.3
    order: start-first

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      tusd:
        condition: service_healthy
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  web:
    image: ghcr.io/unclesp1d3r/cipherswarm:${CIPHERSWARM_IMAGE_TAG:?CIPHERSWARM_IMAGE_TAG must be set for production (never :latest)}
    # Note: prod web is NOT reachable from the host — traffic enters through
    # nginx. The base file intentionally defines no `ports:` on web, so the
    # prod layer inherits that (no port exposure). Don't invoke prod with
    # the dev override file, which would add `80:80` on web and bypass nginx.
    environment:
      TUSD_HOOK_SECRET: ${TUSD_HOOK_SECRET:?TUSD_HOOK_SECRET must be set for production}
    # See docs/deployment/docker-storage-and-tmp.md for tmpfs sizing guidance.
    # For 100 GB+ attack resources, set TMPFS_TMP_SIZE >= 1.5x your largest file.
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-512m},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    deploy: *replicas

  sidekiq:
    image: ghcr.io/unclesp1d3r/cipherswarm:${CIPHERSWARM_IMAGE_TAG:?CIPHERSWARM_IMAGE_TAG must be set for production (never :latest)}
    # See docs/deployment/docker-storage-and-tmp.md for tmpfs sizing guidance.
    # Sidekiq downloads blobs to /tmp during ingest jobs — size for your largest file.
    # For 100 GB+ wordlists, consider a bind-mounted TMPDIR instead of RAM-backed tmpfs.
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-512m},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    deploy:
      replicas: ${SIDEKIQ_REPLICAS:-4}
      <<: *replicas

  redis-db:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 1s
      timeout: 3s
      retries: 5

  tusd:
    # Production uses authenticated hooks back to web.
    environment:
      - TUSD_HOOK_SECRET=${TUSD_HOOK_SECRET:?TUSD_HOOK_SECRET must be set for production}

  tusd-cleanup:
    image: alpine:3.20
    volumes:
      - tus_uploads:/srv/tusd-data
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        find /srv/tusd-data -name '*.info' -mmin +1440 -exec sh -c 'rm -f \"$$1\" \"$${1%.info}\"' _ {} \\;;
        sleep 3600;
      done"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Monitoring profile — opt in with `--profile monitoring`.
  #
  # Requires METRICS_ENABLED=true in .env so web/sidekiq expose /metrics.
  # All images pinned for air-gapped deployment — pre-pull before transfer.
  # --------------------------------------------------------------------------

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.4.1
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
    networks:
      - backend
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana-oss:11.6.0
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_SERVER_ROOT_URL: "http://${APPLICATION_HOST:-localhost}:${GRAFANA_PORT:-3001}"
      # Air-gapped: disable all external checks.
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    networks:
      - backend
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: "redis://redis-db:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
