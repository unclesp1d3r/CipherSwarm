# Environment variables shared by all services
# See docs/deployment/environment-variables.md for complete documentation
# Copy .env.example to .env and fill in your values
x-common-env-vars: &common-env-vars
  RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  REDIS_URL: redis://redis-db:6379/0
  DATABASE_URL: postgres://root:${POSTGRES_PASSWORD:-password}@postgres-db/cipherswarm
  APPLICATION_HOST: ${APPLICATION_HOST:-localhost}
  DISABLE_SSL: ${DISABLE_SSL:-true}
  ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}

services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      <<: *common-env-vars
    depends_on:
      - redis-db
      - postgres-db
      - sidekiq
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-1g},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    volumes:
      - storage:/rails/storage
    networks:
      - frontend
      - backend
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost/up || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - path: ./app
          action: sync
          target: /rails/app
        - path: ./config
          action: sync
          target: /rails/config
        - path: ./lib
          action: sync
          target: /rails/lib
        - path: ./db
          action: sync
          target: /rails/db
        - path: ./Gemfile
          action: rebuild
        - path: ./Gemfile.lock
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  postgres-db:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - backend

  redis-db:
    image: redis:7.2-alpine
    networks:
      - backend
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

  sidekiq:
    build: .
    command: bundle exec sidekiq
    environment:
      <<: *common-env-vars
    depends_on:
      - redis-db
      - postgres-db
    tmpfs:
      - /tmp:size=${TMPFS_TMP_SIZE:-1g},mode=1777
      - /rails/tmp:size=${TMPFS_RAILS_TMP_SIZE:-256m},mode=1777
    volumes:
      - storage:/rails/storage
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:7433 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - path: ./app
          action: sync
          target: /rails/app
        - path: ./config
          action: sync
          target: /rails/config
        - path: ./lib
          action: sync
          target: /rails/lib
        - path: ./Gemfile
          action: rebuild
        - path: ./Gemfile.lock
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
  frontend:

volumes:
  storage:
  postgres:
  redis-data:
