# Nginx reverse proxy configuration for CipherSwarm production load balancing.
#
# REASONING:
#   Why: A single web instance becomes a bottleneck when many cracking agents
#        send concurrent status updates. Nginx distributes requests across
#        multiple Puma replicas using Docker DNS service discovery.
#   Alternatives considered: HAProxy (heavier), Traefik (more complex config),
#        Docker Swarm ingress (requires Swarm mode).
#   Decision: Nginx is lightweight, well-understood, and works with plain
#        Docker Compose scaling via the embedded DNS resolver.
#   Performance: least_conn algorithm ensures even distribution under load;
#        keepalive connections reduce TCP overhead between nginx and backends.
#   Future: Consider Traefik if automatic TLS and container-aware routing
#        become requirements. Evaluate nginx Unit for application-level
#        integration.

worker_processes auto;

error_log /dev/stderr notice;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS resolver for dynamic upstream resolution.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Custom log format with upstream context for diagnosing load distribution.
    log_format upstream_log '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'upstream=$upstream_addr '
                            'upstream_status=$upstream_status '
                            'upstream_response_time=$upstream_response_time '
                            'request_time=$request_time';

    access_log /dev/stdout upstream_log;

    # Upstream pool targeting the scaled 'web' service.
    # Docker DNS resolves 'web' to all replica container IPs.
    # tusd resumable upload server (Go sidecar container).
    upstream tusd_backend {
        server tusd:8080;
        keepalive 16;
    }

    # Upstream pool targeting the scaled 'web' service.
    upstream web_backend {
        # Shared memory zone required for the 'resolve' parameter.
        zone web_backend_zone 64k;
        least_conn;

        # 'resolve' re-queries DNS so new/removed replicas are picked up
        # automatically. Requires nginx >= 1.27.3 (open-sourced from nginx Plus).
        # max_fails / fail_timeout control passive health checks.
        server web:80 resolve max_fails=3 fail_timeout=30s;

        # Keep persistent connections to backends for efficiency.
        keepalive 32;
    }

    # Dedicated health endpoint for Docker healthcheck (avoids depending on backends).
    server {
        listen 8080;

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 80;

        # Security headers — reinforce Rails-level protections at the reverse proxy layer.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=()" always;
        # Note: Strict-Transport-Security (HSTS) should only be enabled when TLS
        # is terminated at this nginx instance. When TLS terminates upstream (e.g.,
        # cloud LB), the upstream proxy should set HSTS instead.

        # Reasonable default for non-storage endpoints (API requests, form submissions).
        client_max_body_size 100M;

        # Internal location for X-Accel-Redirect file serving of attack resources.
        # Rails authorizes the request and returns an X-Accel-Redirect header;
        # nginx serves the file directly from disk at wire speed.
        location /internal/attack_resources/ {
            internal;
            alias /data/attack_resources/;
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
        }

        # tusd resumable upload server (Go sidecar) — chunked uploads with
        # progress, resume, and support for 100+ GB files.
        location /uploads/ {
            proxy_pass http://tusd_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Host              $host;

            # CRITICAL: disable ALL buffering for tus resumable uploads
            proxy_request_buffering off;
            proxy_buffering off;

            client_max_body_size 0;
            proxy_connect_timeout 60s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
            client_body_timeout   3600s;
        }

        # WebSocket support for Action Cable (Turbo Streams via Redis adapter).
        location /cable {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 86400s;
        }

        # Active Storage direct uploads and downloads — stream through without buffering.
        # Without this, nginx buffers the entire request body to
        # /var/cache/nginx/client_temp/ before proxying, which fills
        # the container's overlay filesystem on large uploads.
        location /rails/active_storage/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Allow unlimited file uploads (hash lists, word lists, rule files).
            # Size is bounded by available storage, not by nginx.
            client_max_body_size 0;

            # Stream the upload body directly to the backend.
            proxy_request_buffering off;

            # Stream download responses directly to the client without buffering.
            proxy_buffering off;

            # Large uploads and downloads need generous timeouts.
            proxy_connect_timeout 60s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }

        location / {
            proxy_pass http://web_backend;

            # Use HTTP/1.1 with empty Connection header for keepalive.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Preserve client information for Rails request handling.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Timeouts — generous enough for API responses and normal web requests.
            # Large file transfers use the /rails/active_storage/ location with
            # longer timeouts.
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    300s;

            # Retry the next upstream on transient errors (GET/HEAD only).
            # nginx does NOT retry non-idempotent methods (POST/PATCH/PUT/DELETE)
            # by default, so agent API write operations are safe from duplication.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;
        }
    }
}
