# Python, Ruby, and Bun are listed as latest specifically so that they will use the idiomatic version file to determine the version to use. This allows us to have a single source of truth for the versions of these languages, and it also allows us to easily update the versions by simply updating the idiomatic version file.

[tools]
python            = "latest"
actionlint        = "1.7.11"
bun               = "latest"
docker-cli        = "29.3.0"
docker-compose    = "5.0.2"
"gem:rails"       = "latest"
git-cliff         = "2.12.0"
just              = "latest"
markdownlint-cli2 = "0.21.0"
oxlint            = "1.51.0"
pre-commit        = "4.5.1"
vale              = "3.13.1"
"gem:rubocop"     = "latest"
vacuum            = "0.24.0"
ruby              = "3.4.5"

# Many of these settings are defaults, but we are explicit in case they change in the future and to make it clear to users what is enabled.
[settings]
activate_aggressive                 = true
idiomatic_version_file_enable_tools = [ "ruby", "bun", "python" ]
env_cache                           = true
exec_auto_install                   = true
github_attestations                 = true
lockfile                            = true
pin                                 = true
slsa                                = true

[settings.npm]
package_manager = "bun"

[settings.pipx]
uvx = true

[settings.ruby]
compile = false
